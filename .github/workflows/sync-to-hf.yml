name: Sync to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v5

      - name: Sync GitHub repo to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail

          uvx --from "huggingface_hub[cli]" hf repos create salirafi/AstRoBERT \
            --repo-type space \
            --space-sdk gradio \
            --exist-ok \
            --token "$HF_TOKEN"

          uvx --from "huggingface_hub[cli]" hf upload salirafi/AstRoBERT . . \
            --repo-type space \
            --token "$HF_TOKEN" \
            --delete "*" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".DS_Store" \
            --exclude "**/.DS_Store" \
            --exclude ".env" \
            --exclude ".venv/*" \
            --exclude "__pycache__/*" \
            --exclude "data_/*" \
            --exclude "data/BERT_embeddings/faiss_index.index" \
            --commit-message "Sync GitHub repo to Hugging Face Space"
